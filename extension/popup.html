<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Visual Feedback</h1>
  <p id="hint" class="sub">Click "Start annotating", then click elements on the page. Shortcut: Alt+Shift+A</p>
  <div class="row">
    <button id="annotate">Start annotating</button>
  </div>
  <div class="row">
    <button id="test" class="secondary">Write test annotation</button>
  </div>
  <div class="opts">
    <label><input type="checkbox" id="optShots" /> Include screenshots</label>
    <label><input type="checkbox" id="optCss" /> Include computed CSS</label>
    <p class="sub">Off = leaner batches: only the element anchor and your comment reach the agent.</p>
  </div>
  <p id="msg" class="msg"></p>
  <script type="module" src="popup.js"></script>
</body>
</html>
